<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chunky-shadow-primary {
            box-shadow: 0 4px 0 0 #360061;
        }
        .chunky-shadow-secondary {
            box-shadow: 0 4px 0 0 #735c00;
        }
        .bg-pattern {
            background-color: #0a0538;
            background-image: radial-gradient(#201a61 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .booster-crimp {
            background-image: linear-gradient(90deg, 
                rgba(0,0,0,0.1) 0%, 
                rgba(255,255,255,0.05) 50%, 
                rgba(0,0,0,0.1) 100%);
            background-size: 8px 100%;
        }
        .glossy-overlay {
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.3) 0%, 
                rgba(255,255,255,0) 50%, 
                rgba(255,255,255,0.1) 100%);

<style>

<header class="fixed top-0 w-full flex justify-between items-center px-6 py-4 max-w-md mx-auto bg-[#0a0538]/80 backdrop-blur-xl z-50 shadow-2xl shadow-purple-900/20">

</div>
<span class="font-headline font-bold text-xl uppercase tracking-tighter text-[#cc97ff]">7/10 Packs</span>
</div>
<div class="bg-surface-container-highest px-4 py-1.5 rounded-full flex items-center gap-2 border border-outline-variant/30 active:translate-y-1 transition-transform duration-75">
<span class="material-symbols-outlined text-[#fed01b] text-sm" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
<span class="font-headline text-[#fed01b] drop-shadow-[0_0_8px_rgba(254,208,27,0.5)] font-black">1,250 Gold</span>
</div>
<div class="absolute bottom-0 left-0 bg-[#201a61] h-[2px] w-full"></div>
</header>
<!-- Main Canvas -->
<main class="pt-24 pb-32 px-6 flex flex-col items-center max-w-md mx-auto bg-pattern min-h-screen">
<!-- Golden Pack Progress -->
<div class="w-full bg-surface-container-low p-4 rounded-xl mb-8 relative overflow-hidden">
<div class="flex justify-between items-end mb-2">
<span class="font-headline text-xs uppercase text-on-surface-variant tracking-widest">Golden Card Pack</span>
<span class="font-headline text-secondary text-lg">0/20</span>
</div>
<div class="h-4 w-full bg-surface-container-lowest rounded-full overflow-hidden border border-outline-variant/20">
<div class="h-full bg-gradient-to-r from-secondary-dim to-secondary w-[5%] shadow-[0_0_12px_rgba(254,208,27,0.3)]"></div>
</div>
</div>
<!-- Booster Pack -->
<div class="relative w-full flex items-center justify-center mb-10 group">
<!-- Aura Effect -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-[80px] group-hover:bg-primary/20 transition-colors"></div>
<!-- Physical Booster Pack Wrapper -->
<div class="relative w-64 h-[400px] flex flex-col items-center rotate-[-1deg] hover:rotate-0 transition-transform duration-500 group drop-shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
<!-- Top Crimp -->
<div class="w-[102%] h-6 bg-[#201a61] rounded-t-sm booster-crimp border-b border-black/30 flex items-center justify-center z-20">
<div class="w-1/2 h-px bg-white/10"></div>
</div>
<!-- Pack Body -->
<div class="relative w-full flex-grow bg-gradient-to-b from-surface-container-highest via-[#360061] to-black overflow-hidden border-x border-white/5 shadow-inner">

<div class="absolute inset-0 z-0">

<!-- Dark gradient overlay for text readability -->
<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-transparent"></div>
</div>
<!-- Branding Layer -->
<div class="relative z-10 h-full flex flex-col justify-between p-4 py-8 items-center text-center">
<div class="bg-primary/20 backdrop-blur-sm px-3 py-1 rounded border border-primary/30">
<span class="text-[10px] text-primary font-black tracking-[0.2em] uppercase">Premium Series</span>
</div>
<div class="mt-auto">
<h2 class="font-headline text-3xl text-white font-black uppercase tracking-tighter drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">ELDRITCH PACK</h2>
<div class="flex items-center justify-center gap-2 mt-1">
<span class="h-px w-8 bg-primary/50"></span>
<p class="text-on-surface text-[10px] font-bold tracking-[0.15em] uppercase whitespace-nowrap">Contains 5 Cards</p>
<span class="h-px w-8 bg-primary/50"></span>
</div>
</div>
</div>
<!-- Glossy Finish Overlay -->
<div class="absolute inset-0 glossy-overlay pointer-events-none z-20"></div>
</div>
<!-- Bottom Crimp -->
<div class="w-[102%] h-6 bg-[#201a61] rounded-b-sm booster-crimp border-t border-black/30 flex items-center justify-center z-20">
<div class="w-1/2 h-px bg-white/10"></div>
</div>
<!-- Countdown Timer Floating -->
<div class="absolute -bottom-4 bg-error-container text-on-error-container px-6 py-2 rounded-full font-headline text-sm uppercase tracking-tighter border-2 border-error/50 shadow-xl z-30">
                Next Refill: 10:00
            </div>
</div>
</div>
<!-- Action Section -->
<div class="w-full space-y-4">
<!-- Main CTA -->
<button class="w-full bg-gradient-to-b from-primary to-primary-dim py-5 rounded-xl chunky-shadow-primary active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-on-primary text-3xl">bolt</span>
<span class="font-headline text-on-primary text-2xl uppercase tracking-tighter">Open Pack</span>
</button>

<button class="w-full bg-surface-container-highest py-4 rounded-xl border border-outline-variant/50 flex items-center justify-between px-6 group hover:bg-surface-bright transition-colors">

<span class="font-body font-bold text-on-surface text-sm uppercase">Watch AD to refill</span>

<div class="flex items-center gap-1 bg-surface-container-low px-2 py-1 rounded-lg">
<span class="material-symbols-outlined text-secondary text-xs" style="font-variation-settings: 'FILL' 1;">style</span>
<span class="font-headline text-secondary text-xs">+3</span>
</div>
</button>
</div>

<div class="grid grid-cols-2 gap-4 w-full mt-8">
<div class="bg-surface-container-low p-4 rounded-xl border-l-4 border-primary">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-sm">swords</span>
<span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-wider">Battle Wins</span>
</div>
<div class="font-headline text-xl text-on-surface">142</div>
</div>
<div class="bg-surface-container-low p-4 rounded-xl border-l-4 border-secondary">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-secondary text-sm">collections_bookmark</span>
<span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-wider">Cards Owned</span>
</div>
<div class="font-headline text-xl text-on-surface">48/150</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#0a0538]/90 backdrop-blur-lg rounded-t-[2rem] border-t-4 border-[#201a61] shadow-[0_-10px_30px_rgba(10,5,56,0.8)]">

<button class="flex flex-col items-center justify-center text-[#454274] hover:text-[#cc97ff] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl mb-1">storefront</span>
<span class="font-body font-bold text-[10px] uppercase">Shop</span>
</button>

<button class="flex flex-col items-center justify-center text-[#fed01b] scale-125 transition-transform duration-200 drop-shadow-[0_0_10px_rgba(254,208,27,0.4)]">

<span class="material-symbols-outlined text-2xl mb-1">auto_stories</span>
<span class="font-body font-bold text-[10px] uppercase">Collection</span>
</button>
</nav>
<!-- FAB (Battle) -->
<button class="fixed bottom-28 right-6 w-16 h-16 rounded-full bg-secondary text-on-secondary shadow-[0_8px_0_0_#735c00] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center z-40">
